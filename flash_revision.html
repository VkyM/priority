<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flashcard Manager + Revision Tracker</title>
<style>
body {
  font-family: "Segoe UI", sans-serif;
  background: #f4f6f8;
  margin: 0;
  color: #222;
}
header {
  background: #4a90e2;
  color: white;
  text-align: center;
  padding: 15px;
  font-size: 1.6em;
}
.container {
  max-width: 1000px;
  margin: 20px auto;
  padding: 15px;
}
button {
  background: #4a90e2;
  color: white;
  border: none;
  border-radius: 8px;
  padding: 8px 12px;
  cursor: pointer;
}
button:hover { background: #357ABD; }
input, textarea {
  width: 100%;
  padding: 8px;
  margin-top: 6px;
  border-radius: 6px;
  border: 1px solid #ccc;
}

.project-card {
  background: white;
  border-radius: 10px;
  padding: 15px;
  margin: 10px 0;
  box-shadow: 0 3px 8px rgba(0,0,0,0.1);
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.project-buttons button { margin-left: 8px; }

.topbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.project-main {
  display: flex;
  gap: 20px;
}

.left-section {
  flex: 3;
}

.right-section {
  flex: 1;
  background: #eef6ff;
  padding: 10px;
  border-radius: 8px;
  max-height: 600px;
  overflow-y: auto;
}

.note-box {
  background: #eef6ff;
  border-radius: 8px;
  padding: 10px;
  margin-top: 10px;
}
.note-box textarea {
  width: 100%;
  min-height: 60px;
}

.flashcard {
  width: 230px;
  height: 150px;
  perspective: 1000px;
  display: inline-block;
  margin: 10px;
  position: relative;
}
.flashcard-inner {
  position: relative;
  width: 100%;
  height: 100%;
  text-align: center;
  transition: transform 0.6s;
  transform-style: preserve-3d;
  cursor: pointer;
}
.flashcard:hover .flashcard-inner { transform: rotateY(180deg); }
.flashcard-front, .flashcard-back {
  position: absolute;
  width: 100%;
  height: 100%;
  border-radius: 10px;
  backface-visibility: hidden;
  box-shadow: 0 3px 8px rgba(0,0,0,0.1);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 15px;
  box-sizing: border-box;
  flex-direction: column;
}
.flashcard-front { background: #fff; }
.flashcard-back { background: #4a90e2; color: white; transform: rotateY(180deg); }

.flashcard-delete {
  position: absolute;
  top: 5px;
  right: 5px;
  background: #fff;
  color: #000;
  border-radius: 50%;
  width: 25px;
  height: 25px;
  border: none;
  cursor: pointer;
  font-weight: bold;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 2;
}

/* Modal */
.modal {
  display: none;
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.5);
  justify-content: center;
  align-items: center;
}
.modal-content {
  background: white;
  padding: 20px;
  border-radius: 10px;
  width: 90%;
  max-width: 400px;
}
.modal-content button { width: 100%; margin-top: 10px; }

</style>
</head>
<body>

<header>📚 Flashcard Manager + Revision Tracker</header>

<div class="container" id="homeView">
  <h2>Projects</h2>
  <input id="newProjectName" placeholder="Enter project name">
  <button id="addProjectBtn">Create Project</button>
  <div id="projectsList"></div>

  <h2>Today's Revision</h2>
  <div id="todayRevisionHome"></div>
</div>

<div class="container" id="projectView" style="display:none;">
  <div class="topbar">
    <button id="backBtn">⬅ Back</button>
    <h2 id="projectTitle"></h2>
    <button id="addFlashBtn">➕</button>
  </div>

  <div class="project-main">
    <div class="left-section">
      <div class="note-box">
        <h4>🗒 Notes</h4>
        <textarea id="projectNote" placeholder="Write notes about this project..."></textarea>
      </div>
      <h4>All Flashcards</h4>
      <div id="flashcardsContainer"></div>
    </div>

    <div class="right-section">
      <h4>Today's Revision</h4>
      <div id="todayRevisionContainer"></div>
    </div>
  </div>
</div>

<!-- Flashcard Modal -->
<div class="modal" id="flashModal">
  <div class="modal-content">
    <h3>Create Flashcard</h3>
    <input id="question" placeholder="Question">
    <textarea id="answer" placeholder="Answer"></textarea>
    <button id="saveFlashBtn">Save</button>
    <button id="cancelFlashBtn" style="background:#ccc;color:#000;">Cancel</button>
  </div>
</div>

<script>
let projects = JSON.parse(localStorage.getItem('projects')) || {};
let currentProject = null;

// DOM elements
const homeView = document.getElementById('homeView');
const projectView = document.getElementById('projectView');
const projectsList = document.getElementById('projectsList');
const projectTitle = document.getElementById('projectTitle');
const projectNote = document.getElementById('projectNote');
const flashcardsContainer = document.getElementById('flashcardsContainer');
const todayRevisionContainer = document.getElementById('todayRevisionContainer');
const todayRevisionHome = document.getElementById('todayRevisionHome');
const flashModal = document.getElementById('flashModal');
const questionInput = document.getElementById('question');
const answerInput = document.getElementById('answer');

function save() { localStorage.setItem('projects', JSON.stringify(projects)); }

// ---- Project functions ----
function addProject(name) {
  if (!name) return alert("Enter project name!");
  if (projects[name]) return alert("Project already exists!");
  projects[name] = { flashcards: [], note: "" };
  save();
  renderProjects();
  renderTodayRevisionHome();
}

function renderProjects() {
  projectsList.innerHTML = '';
  const names = Object.keys(projects);
  if (!names.length) { projectsList.innerHTML = "<p>No projects yet. Create one above.</p>"; return; }
  names.forEach(name => {
    const card = document.createElement('div');
    card.className = 'project-card';
    const buttonsDiv = document.createElement('div');
    buttonsDiv.className = 'project-buttons';

    const openBtn = document.createElement('button'); openBtn.textContent='📚 Open';
    openBtn.addEventListener('click',()=>openProject(name));

    const delBtn = document.createElement('button'); delBtn.textContent='🗑';
    delBtn.addEventListener('click',()=>deleteProject(name));

    buttonsDiv.appendChild(openBtn); buttonsDiv.appendChild(delBtn);
    card.innerHTML=`<b>${name}</b>`;
    card.appendChild(buttonsDiv);
    projectsList.appendChild(card);
  });
}

function deleteProject(name) {
  if(confirm(`Delete project "${name}"?`)){
    delete projects[name];
    save();
    renderProjects();
    renderTodayRevisionHome();
  }
}

function openProject(name){
  currentProject=name;
  homeView.style.display='none';
  projectView.style.display='block';
  projectTitle.textContent=name;
  projectNote.value=projects[name].note||'';
  renderFlashcards();
  renderTodayRevision();
}

function backHome(){
  currentProject=null;
  homeView.style.display='block';
  projectView.style.display='none';
  renderProjects();
  renderTodayRevisionHome();
}

// ---- Flashcard functions ----
function openModal(){ flashModal.style.display='flex'; }
function closeModal(){ flashModal.style.display='none'; questionInput.value=''; answerInput.value=''; }

function saveFlashcard(){
  if(!currentProject) return alert("Open a project first!");
  const q = questionInput.value.trim(); const a = answerInput.value.trim();
  if(!q || !a) return alert("Fill both fields!");
  const date = new Date().toISOString().split('T')[0];
  const revisionDays = [1,3,7,14,30];
  const revisions = revisionDays.map(d=>{
    const revDate=new Date(); revDate.setDate(revDate.getDate()+d);
    return revDate.toISOString().split('T')[0];
  });
  projects[currentProject].flashcards.push({ question:q, answer:a, date, revisions });
  save(); closeModal(); renderFlashcards(); renderTodayRevision(); renderTodayRevisionHome();
}

function renderFlashcards(){
  flashcardsContainer.innerHTML='';
  const cards=projects[currentProject].flashcards;
  if(!cards.length){ flashcardsContainer.innerHTML="<p>No flashcards yet. Click ➕ to add.</p>"; return; }
  cards.forEach((card,index)=>{
    const div=document.createElement('div'); div.className='flashcard';
    const inner=document.createElement('div'); inner.className='flashcard-inner';
    const front=document.createElement('div'); front.className='flashcard-front'; front.textContent=card.question;
    const back=document.createElement('div'); back.className='flashcard-back';
    back.innerHTML=`<div>${card.answer}</div><div style="margin-top:5px;font-size:0.8em">Next revisions: ${card.revisions.join(', ')}</div>`;
    const delBtn=document.createElement('button'); delBtn.textContent='🗑';
    delBtn.className='flashcard-delete';
    delBtn.addEventListener('click',()=>{ deleteFlashcard(index); });
    div.appendChild(delBtn); inner.appendChild(front); inner.appendChild(back); div.appendChild(inner);
    flashcardsContainer.appendChild(div);
  });
}

function deleteFlashcard(index){
  if(confirm("Delete this flashcard?")){
    projects[currentProject].flashcards.splice(index,1);
    save();
    renderFlashcards();
    renderTodayRevision();
    renderTodayRevisionHome();
  }
}

// ---- Today's revision ----
function renderTodayRevision(){
  todayRevisionContainer.innerHTML='';
  const today=new Date().toISOString().split('T')[0];
  const cards=projects[currentProject].flashcards.filter(c=>c.revisions.includes(today));
  if(!cards.length){ todayRevisionContainer.innerHTML="<p>No flashcards for today.</p>"; return; }
  cards.forEach(card=>{
    const div=document.createElement('div'); div.className='flashcard';
    const inner=document.createElement('div'); inner.className='flashcard-inner';
    const front=document.createElement('div'); front.className='flashcard-front'; front.textContent=card.question;
    const back=document.createElement('div'); back.className='flashcard-back'; back.textContent=card.answer;
    inner.appendChild(front); inner.appendChild(back); div.appendChild(inner);
    todayRevisionContainer.appendChild(div);
  });
}

// ---- Home page today's revision (all projects) ----
function renderTodayRevisionHome(){
  todayRevisionHome.innerHTML='';
  const today=new Date().toISOString().split('T')[0];
  let any=false;
  Object.keys(projects).forEach(proj=>{
    const cards=projects[proj].flashcards.filter(c=>c.revisions.includes(today));
    cards.forEach(card=>{
      any=true;
      const div=document.createElement('div'); div.className='flashcard';
      const inner=document.createElement('div'); inner.className='flashcard-inner';
      const front=document.createElement('div'); front.className='flashcard-front'; front.textContent=card.question;
      const back=document.createElement('div'); back.className='flashcard-back';
      back.innerHTML=`${card.answer}<br><small>Project: ${proj}</small>`;
      inner.appendChild(front); inner.appendChild(back); div.appendChild(inner);
      todayRevisionHome.appendChild(div);
    });
  });
  if(!any) todayRevisionHome.innerHTML="<p>No flashcards to revise today.</p>";
}

// ---- Notes ----
projectNote.addEventListener('input',()=>{ projects[currentProject].note=projectNote.value; save(); });

// ---- Event Listeners ----
document.getElementById('addProjectBtn').addEventListener('click',()=>{ addProject(document.getElementById('newProjectName').value.trim()); document.getElementById('newProjectName').value=''; });
document.getElementById('backBtn').addEventListener('click',backHome);
document.getElementById('addFlashBtn').addEventListener('click',openModal);
document.getElementById('saveFlashBtn').addEventListener('click',saveFlashcard);
document.getElementById('cancelFlashBtn').addEventListener('click',closeModal);

// ---- Initial render ----
renderProjects();
renderTodayRevisionHome();

</script>
</body>
</html>
